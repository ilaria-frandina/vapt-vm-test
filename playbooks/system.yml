---
- name: Aggiornamento sistema e pacchetti base
  hosts: "{{ target }}"
  become: true

  tasks:
    - name: Aggiorna cache apt e fa upgrade del sistema
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Installa pacchetti base
      ansible.builtin.apt:
        name:
          - git
          - curl
          - wget
          - vim
          - nano
          - htop
          - tmux
          - screen
          - unzip
          - jq
          - tree
          - file
          - strace
          - ltrace
          - binutils
          - net-tools
          - dnsutils
          - whois
          - iputils-ping
          - traceroute
          - fd-find
          - ripgrep
          - bash-completion
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - build-essential
          - libssl-dev
          - libffi-dev
          - perl
        state: present

