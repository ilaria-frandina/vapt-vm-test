name: Build VA/PT VM

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      format:
        description: "Formato da costruire"
        required: true
        default: "qcow2"
        type: choice
        options:
          - qcow2
          - ova
          - all

env:
  PACKER_VERSION: "latest"

jobs:
  # ── QCOW2 (Linux runner con KVM) — ad ogni push su main ──────────────────
  build-qcow2:
    name: Build QCOW2
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && (inputs.format == 'qcow2' || inputs.format == 'all'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Abilita KVM per il runner
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Installa QEMU
        run: sudo apt-get update -y && sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: Installa Packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Installa Ansible e collection richieste
        run: |
          pip3 install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Inizializza plugin Packer
        run: packer init packer/

      - name: Installa vncdotool per screenshot debug
        run: pip3 install vncdotool

      - name: Build QCOW2
        run: |
          mkdir -p /tmp/vnc-shots
          PACKER_LOG=1 packer build -only='qcow2.qemu.qcow2' packer/ 2>&1 | tee /tmp/packer.log &
          PACKER_PID=$!
          sleep 60
          while kill -0 $PACKER_PID 2>/dev/null; do
            TS=$(date +%H%M%S)
            vncdo --server=127.0.0.1:5900 screenshot /tmp/vnc-shots/${TS}.png 2>/dev/null || true
            sleep 120
          done
          wait $PACKER_PID
        env:
          PKR_VAR_vm_password: ${{ secrets.VM_PASSWORD }}
          PKR_VAR_vm_version: ${{ github.run_number }}

      - name: Upload screenshot VNC
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vnc-screenshots-${{ github.run_number }}
          path: /tmp/vnc-shots/
          retention-days: 3

      - name: Upload log Packer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packer-log-${{ github.run_number }}
          path: /tmp/packer.log
          retention-days: 3

      - name: Comprimi QCOW2
        run: zstd -T0 -15 output/qcow2/*.qcow2 --rm

      - name: Upload alla Release GitHub
        if: github.event_name == 'release'
        run: gh release upload ${{ github.event.release.tag_name }} output/qcow2/*.qcow2.zst
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artefatto QCOW2 (solo dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: vapt-vm-${{ github.run_number }}-qcow2
          path: output/qcow2/*.qcow2.zst
          retention-days: 7

  # ── OVA (macOS runner con VirtualBox) — solo su release o dispatch ────────
  build-ova:
    name: Build OVA
    runs-on: macos-13
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && (inputs.format == 'ova' || inputs.format == 'all'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa VirtualBox
        run: brew install --cask virtualbox

      - name: Installa Packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Installa Ansible e collection richieste
        run: |
          pip3 install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Inizializza plugin Packer
        run: packer init packer/

      - name: Build OVA
        run: packer build -only='ova.virtualbox-iso.ova' packer/
        env:
          PKR_VAR_vm_password: ${{ secrets.VM_PASSWORD }}
          PKR_VAR_vm_version: ${{ github.run_number }}

      - name: Upload alla Release GitHub
        if: github.event_name == 'release'
        run: gh release upload ${{ github.event.release.tag_name }} output/ova/*.ova
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artefatto OVA (solo dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: vapt-vm-${{ github.run_number }}-ova
          path: output/ova/*.ova
          retention-days: 7
