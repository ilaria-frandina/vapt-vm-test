# ── Lingua e tastiera ────────────────────────────────────────────────────────
d-i debian-installer/locale string en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# ── Rete ─────────────────────────────────────────────────────────────────────
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string vapt-vm
d-i netcfg/get_domain string

# ── Mirror Kali ───────────────────────────────────────────────────────────────
d-i mirror/country string manual
d-i mirror/http/hostname string http.kali.org
d-i mirror/http/directory string /kali
d-i mirror/http/proxy string
d-i mirror/suite string kali-rolling

# ── Orologio ──────────────────────────────────────────────────────────────────
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# ── Partizionamento: LVM su tutto il disco ────────────────────────────────────
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# ── Utente (root disabilitato, vapt con sudo) ─────────────────────────────────
d-i passwd/root-login boolean false
d-i passwd/user-fullname string VA/PT User
d-i passwd/username string vapt
d-i passwd/user-password password vapt
d-i passwd/user-password-again password vapt
d-i passwd/user-default-groups string sudo cdrom audio video plugdev netdev bluetooth

# ── Pacchetti base (nessun desktop — lo installa Ansible) ────────────────────
tasksel tasksel/first multiselect
d-i pkgsel/include string openssh-server sudo python3 curl wget
d-i pkgsel/update-policy select none

# ── Repository non-free (necessario per alcuni tool Kali) ────────────────────
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true

# ── Grub ──────────────────────────────────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# ── Comandi post-install: abilita SSH con password per Packer ─────────────────
d-i preseed/late_command string \
  in-target sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config; \
  echo 'PasswordAuthentication yes' > /target/etc/ssh/sshd_config.d/99-packer.conf; \
  in-target systemctl enable ssh; \
  echo 'vapt ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/vapt; \
  chmod 0440 /target/etc/sudoers.d/vapt

d-i finish-install/reboot_in_progress note
