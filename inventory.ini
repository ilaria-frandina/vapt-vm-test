# Inventory per provisioning manuale su VM in esecuzione.
# Durante il build Packer usa il proprio inventory temporaneo — questo file
# serve solo quando si vuole ri-eseguire un playbook su una VM già avviata.

[vapt-vm]
# 192.168.122.x   ansible_user=vapt ansible_ssh_private_key_file=~/.ssh/vapt-vm
